# 工作流的名称
name: LXCloud Auto Check-in

# 触发工作流的条件
on:
  # 允许你手动在 Actions 页面点击 "Run workflow" 来运行
  workflow_dispatch:
  
  # 定时任务：使用 Cron 表达式，这里设置为每天北京时间上午9点30分运行
  # '30 1 * * *' -> 1:30 UTC -> 9:30 CST
  schedule:
    - cron: '30 1 * * *'

# 定义一个或多个作业（jobs）
jobs:
  checkin:
    # 指定运行此作业的虚拟机环境，ubuntu-latest 是最常用的
    runs-on: ubuntu-latest

    # 作业的执行步骤
    steps:
      # 第一步：检出（下载）你的仓库代码到虚拟机
      - name: Checkout repository
        uses: actions/checkout@v4

      # 第二步：设置 Python 环境
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10' 

      # 第三步：安装系统依赖（非常重要！）
      # 安装 Chromium 浏览器、对应的驱动以及中文字体（防止截图乱码）
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y chromium-browser chromium-chromedriver fonts-wqy-zenhei

      # 第四步：安装 Python 依赖包
      - name: Install Python packages
        run: |
          python -m pip install --upgrade pip
          pip install seleniumbase requests

      # 第五步：运行你的 Python 签到脚本
      - name: Run the check-in script
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          MY_CHAT_ID: ${{ secrets.MY_CHAT_ID }}
          LX_ACCOUNTS: ${{ secrets.LX_ACCOUNTS }}
        run: |
          python openlxcloud.py # 运行你的脚本
