name: Dabo Auto Checkin

on:
  schedule:
    # 每天北京时间上午 08:30 自动运行 (UTC 00:30)
    - cron: '30 1 * * *'
  workflow_dispatch: # 允许手动点击 "Run workflow" 触发执行

jobs:
  checkin-job:
    runs-on: ubuntu-latest
    
    steps:
      - name: 1. 拉取代码
        uses: actions/checkout@v4

      - name: 2. 安装中文字体与底层过盾依赖 (核心强化)
        run: |
          sudo apt-get update
          # 👇 关键修改：新增安装 xvfb(虚拟屏幕) 和 xdotool(物理点击)
          sudo apt-get install -y fonts-wqy-zenhei xvfb xdotool
          # 刷新字体缓存
          sudo fc-cache -fv
          
      - name: 3. 设置 Python 环境
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip' # 开启缓存以加快后续运行速度

      - name: 4. 安装必要依赖
        run: |
          pip install seleniumbase requests
          # 安装 undetected-chromedriver 运行所需的浏览器驱动
          sbase install chromedriver

      - name: 5. 执行签到脚本 (带虚拟屏幕)
        env:
          LX_ACCOUNTS: ${{ secrets.LX_ACCOUNTS }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          MY_CHAT_ID: ${{ secrets.MY_CHAT_ID }}
        # 👇 关键修改：增加 --server-args 强制 1080p 屏幕
        run: xvfb-run --server-args="-screen 0 1920x1080x24" -a python openlxcloud.py

      - name: 6. 上传运行截图 (可选)
        if: always() # 无论成功失败都上传截图，方便调试
        uses: actions/upload-artifact@v4
        with:
          name: checkin-screenshots
          path: "*.png"
          retention-days: 3
